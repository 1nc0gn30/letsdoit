}).addTo(map);

const bounds = { lat: { min: 36.48, max: 37.42 }, lng: { min: -77.05, max: -75.65 } };
const colors = {
  food: '#f97316', coffee: '#92400e', nightlife: '#7c3aed', outdoors: '#16a34a',
  culture: '#db2777', history: '#854d0e', entertainment: '#0891b2', family: '#0ea5e9',

};

places.forEach(p => {
    const inBounds = p.lat >= bounds.lat.min && p.lat <= bounds.lat.max && p.lng >= bounds.lng.min && p.lng <= bounds.lng.max;
    const color = colors[p.tags[0]] || '#64748b';
    const marker = L.circleMarker([p.lat, p.lng], {
        radius: 6,
        fillColor: color,
        color: inBounds ? '#fff' : '#ef4444',
        weight: inBounds ? 1 : 2,
        opacity: 1,
        fillOpacity: 0.85
    }).addTo(map);

});

const realCount = places.filter(p => p.lat >= bounds.lat.min && p.lat <= bounds.lat.max && p.lng >= bounds.lng.min && p.lng <= bounds.lng.max).length;
